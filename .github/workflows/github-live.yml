name: GitHub Live

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  github-live:
    name: github-live
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      PACEFLOW_GITHUB_TOKEN: ${{ secrets.PACEFLOW_GITHUB_TOKEN }}
      PACEFLOW_GITHUB_TEST_REPO_KEY: ${{ secrets.PACEFLOW_GITHUB_TEST_REPO_KEY }}
      PACEFLOW_GITHUB_TEST_COMMIT_SHA: ${{ secrets.PACEFLOW_GITHUB_TEST_COMMIT_SHA }}
      PACEFLOW_GITHUB_TEST_EXPECTED_PR: ${{ secrets.PACEFLOW_GITHUB_TEST_EXPECTED_PR }}
      PACEFLOW_GITHUB_TEST_EXPECTED_MERGED: ${{ secrets.PACEFLOW_GITHUB_TEST_EXPECTED_MERGED }}
      PACEFLOW_GITHUB_TEST_NO_PR_COMMIT_SHA: ${{ secrets.PACEFLOW_GITHUB_TEST_NO_PR_COMMIT_SHA }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Check live test configuration
        id: config
        shell: bash
        run: |
          missing=0
          for key in \
            PACEFLOW_GITHUB_TOKEN \
            PACEFLOW_GITHUB_TEST_REPO_KEY \
            PACEFLOW_GITHUB_TEST_COMMIT_SHA \
            PACEFLOW_GITHUB_TEST_EXPECTED_PR \
            PACEFLOW_GITHUB_TEST_EXPECTED_MERGED
          do
            if [ -z "${!key}" ]; then
              echo "missing $key"
              missing=1
            fi
          done
          if [ "$missing" -eq 1 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip live GitHub test
        if: steps.config.outputs.enabled != 'true'
        run: |
          echo "Skipping live GitHub test: missing repository secrets"
      - name: Run live GitHub test
        if: steps.config.outputs.enabled == 'true'
        run: cargo test --test github_live -- --ignored --nocapture
